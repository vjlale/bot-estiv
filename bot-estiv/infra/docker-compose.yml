version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bot_estiv_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bot_estiv
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bot_estiv_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: bot_estiv_api
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../../Branding:/branding:ro
      - media_data:/media
    command: ["uvicorn", "bot_estiv.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: bot_estiv_worker
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../Branding:/branding:ro
      - media_data:/media
    command: ["arq", "bot_estiv.schedulers.worker.WorkerSettings"]

  dashboard:
    build:
      context: ../apps/dashboard
      dockerfile: Dockerfile
    container_name: bot_estiv_dashboard
    env_file: ../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
  media_data:
