server {
    listen 80;
    server_name bot-estiv.gardenswood.com.ar;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name api.bot-estiv.gardenswood.com.ar;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name bot-estiv.gardenswood.com.ar;

    ssl_certificate /etc/letsencrypt/live/bot-estiv.gardenswood.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot-estiv.gardenswood.com.ar/privkey.pem;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    server_name api.bot-estiv.gardenswood.com.ar;

    ssl_certificate /etc/letsencrypt/live/api.bot-estiv.gardenswood.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bot-estiv.gardenswood.com.ar/privkey.pem;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
