# Fly.io config para bot-estiv API
# Deploy: fly launch --copy-config --config infra/fly.api.toml --dockerfile apps/api/Dockerfile

app = "bot-estiv-api"
primary_region = "gru"  # São Paulo (cercano a AR)

[build]
  dockerfile = "apps/api/Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[http_service.concurrency]
  type = "requests"
  soft_limit = 200
  hard_limit = 400

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[env]
  APP_ENV = "production"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
